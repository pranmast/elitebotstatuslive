<!DOCTYPE html>
<html>
<head>
    <title>v201.120: Pure Physics</title>
    <!-- CRITICAL: Pinned strictly to v4.1.1. Do NOT unpin or Version 5 update will delete addLineSeries() -->
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background: #08090b; color: #e1e1e1; font-family: 'Courier New', monospace; margin: 0; }
        .header { background: #14151a; padding: 10px; border-bottom: 1px solid #2b2f3a; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .card { background: #14151a; border: 1px solid #2b2f3a; border-radius: 4px; overflow: hidden; }
        .stats { padding: 10px; font-weight: bold; border-top: 1px solid #2b2f3a; background: #1a1c23; }
    </style>
</head>
<body>
    <div class="header">🛰️ 15m MOMENTUM GAUNTLET | v201.120 | <span id="clock">SYNCING...</span></div>
    <div class="grid" id="container"></div>

    <script>
        const charts = {}; 
        const series = {};

        // Helper: Replace all slashes to prevent ID breakages
        const safeId = (sym) => sym.replace(/\//g, '_');

        async function pulse() {
            try {
                // Fetch directly from the silent Telemetry branch to bypass GH Pages build limits
                const res = await fetch('https://raw.githubusercontent.com/pranmast/elitebotstatuslive/telemetry/data.json?nocache=' + Date.now());
                const data = await res.json();
                document.getElementById('clock').innerText = "LAST DATA: " + data.last_update;

                Object.keys(data.fleet).forEach(sym => {
                    const asset = data.fleet[sym];
                    
                    // CRITICAL FIX: Check for the SERIES, not the chart. 
                    // This ensures we re-try setup if it failed partially last time.
                    if (!series[sym]) {
                        setupChart(sym);
                    }

                    // Safety Guard: Don't proceed if setup failed to create the series
                    if (!series[sym]) return;

                    try {
                        // Marker Logic: Snapping to valid times to prevent TV crashes
                        const validTimes = new Set(asset.history.map(d => d.time));
                        let safeMarkers = asset.markers.filter(m => validTimes.has(m.time));

                        if (asset.markers.length > 0 && safeMarkers.length === 0 && asset.history.length > 0) {
                            let snappedMarker = { ...asset.markers[asset.markers.length - 1] };
                            snappedMarker.time = asset.history[asset.history.length - 1].time;
                            safeMarkers = [snappedMarker];
                        }

                        series[sym].setData(asset.history);
                        series[sym].setMarkers(safeMarkers);

                        const color = asset.roi > 0 ? '#00ff88' : (asset.roi < 0 ? '#ff4a4a' : '#fff');
                        const statsEl = document.getElementById(`stats-${safeId(sym)}`);
                        if (statsEl) {
                            statsEl.innerHTML = `POS: ${asset.position} | ROI: <span style="color:${color}">${asset.roi.toFixed(2)}%</span>`;
                        }
                    } catch (err) {
                        console.error(`Update fail on ${sym}:`, err);
                    }
                });
            } catch (e) {
                console.error("No Telemetry Connection:", e);
            }
        }

        function setupChart(sym) {
            const sId = safeId(sym);
            const container = document.getElementById('container');
            
            // 1. Synchronous DOM creation (much more stable than innerHTML)
            const card = document.createElement('div');
            card.className = 'card';
            
            const title = document.createElement('div');
            title.style.padding = '10px';
            title.innerText = sym;
            
            const chartDiv = document.createElement('div');
            chartDiv.id = `c-${sId}`;
            chartDiv.style.height = '350px';
            
            const statsDiv = document.createElement('div');
            statsDiv.className = 'stats';
            statsDiv.id = `stats-${sId}`;
            statsDiv.innerText = 'WAITING...';

            card.appendChild(title);
            card.appendChild(chartDiv);
            card.appendChild(statsDiv);
            container.appendChild(card);

            // 2. Initialize Chart
            try {
                charts[sym] = LightweightCharts.createChart(chartDiv, {
                    width: chartDiv.offsetWidth || (container.offsetWidth / 2 - 20),
                    height: 350,
                    rightPriceScale: {
                        mode: LightweightCharts.PriceScaleMode.Percentage,
                    },
                    layout: {
                        background: { type: 'solid', color: '#14151a' },
                        textColor: '#d1d4dc'
                    },
                    grid: { vertLines: { color: '#2b2f3a' }, horzLines: { color: '#2b2f3a' } },
                    timeScale: { timeVisible: true, secondsVisible: true }
                });

                series[sym] = charts[sym].addLineSeries({ 
                    color: '#2962FF', 
                    lineWidth: 2 
                });
            } catch (e) {
                console.error(`Chart Init Failed for ${sym}:`, e);
                // Delete key so we try again next pulse
                delete charts[sym]; 
            }
        }

        setInterval(pulse, 2000);
    </script>
</body>
</html>
